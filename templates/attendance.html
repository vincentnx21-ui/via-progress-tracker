<!DOCTYPE html>
<html>
<head>
    <title>Attendance</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white p-6">

<div class="flex gap-6 mb-6">
    <a href="/dashboard">Dashboard</a>
    <a href="/attendance" class="text-sky-400">Attendance</a>
    <a href="/admin">Admin</a>
</div>

<h1 class="text-2xl mb-4">Attendance Overview</h1>

{% if members %}
    {% for m in members %}
    <div class="bg-slate-800 p-3 mb-2 rounded flex justify-between">
        <span>{{ m.name }}</span>

        <!-- Show total minutes if exists -->
        <span class="text-slate-400">
            {{ contributions.get(m.name, 0) }} min
        </span>
    </div>
    {% endfor %}
{% else %}
    <p class="text-slate-400">No members yet.</p>
{% endif %}

</body>
</html>
