<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>

  <style>
    body {
      font-family: Arial;
      background: #f5f7fa;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 600px;
      margin: auto;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #4facfe;
      color: white;
      cursor: pointer;
      width: 100%;
    }

    button:hover {
      background: #3a8be0;
    }

    .log-item {
      padding: 8px;
      border-bottom: 1px solid #eee;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="card">
    <h2>Dashboard</h2>
    <p>Total Hours: <span id="hours">0</span></p>
  </div>

  <div class="card">
    <h3>Submit Activity</h3>
    <input id="activity" placeholder="What did you do?">
    <input id="minutes" type="number" placeholder="Minutes">
    <button onclick="submitActivity()">Submit</button>
  </div>

  <div class="card">
    <h3>Your Activities</h3>
    <div id="log"></div>
  </div>

  <button onclick="logout()">Logout</button>

</div>

<!-- KEEP YOUR SCRIPT SAME -->
<script type="module">
/* your firebase code stays the same */
</script>

</body>
</html>
