<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f5f7fa;
    }

    .header {
      background: #4facfe;
      color: white;
      padding: 15px;
      text-align: center;
    }

    .tabs {
      display: flex;
      background: #eee;
    }

    .tab {
      flex: 1;
      padding: 12px;
      text-align: center;
      cursor: pointer;
      background: #ddd;
    }

    .tab.active {
      background: white;
      font-weight: bold;
    }

    .content {
      padding: 20px;
      display: none;
    }

    .content.active {
      display: block;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
    }

    button {
      padding: 10px;
      width: 100%;
      background: #4facfe;
      color: white;
      border: none;
      cursor: pointer;
    }

    .log-item {
      padding: 8px;
      border-bottom: 1px solid #ccc;
    }
  </style>
</head>

<body>

<div class="header">
  <h2>VIA Dashboard</h2>
  <p id="username"></p>
</div>

<div class="tabs">
  <div class="tab active" onclick="showTab(0)">Home</div>
  <div class="tab" onclick="showTab(1)">Submit</div>
  <div class="tab" onclick="showTab(2)">History</div>
</div>

<!-- HOME -->
<div class="content active">
  <h3>Total Hours</h3>
  <p><span id="hours">0</span> hours</p>
</div>

<!-- SUBMIT -->
<div class="content">
  <h3>Submit Activity</h3>
  <input id="activity" placeholder="What did you do?">
  <input id="minutes" type="number" placeholder="Minutes">
  <button onclick="submitActivity()">Submit</button>
</div>

<!-- HISTORY -->
<div class="content">
  <h3>Your Activities</h3>
  <div id="log"></div>
</div>

<button onclick="logout()">Logout</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getDatabase, ref, get, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAUXHMgyVM1kkidzz5FyEfQLfwG7aGTf1Y",
  authDomain: "via-progress-tracker-memory.firebaseapp.com",
  databaseURL: "https://via-progress-tracker-memory-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "via-progress-tracker-memory",
  storageBucket: "via-progress-tracker-memory.appspot.com",
  messagingSenderId: "1022592681906",
  appId: "1:1022592681906:web:2bc2d21155c151770346ab"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getDatabase();

let userData = null;

// 🔒 Protect page
onAuthStateChanged(auth, async (user) => {
  if (!user) {
    window.location.href = "index.html";
    return;
  }

  const snap = await get(ref(db, "users/" + user.uid));
  userData = snap.val();

  document.getElementById("username").textContent = "Welcome, " + userData.name;

  loadActivities(user.uid);
});


// 📊 Load data
async function loadActivities(uid) {
  const snap = await get(ref(db, "activities"));
  let total = 0;
  log.innerHTML = "";

  if (snap.exists()) {
    const data = snap.val();

    for (let id in data) {
      const item = data[id];

      if (item.user === uid) {
        log.innerHTML += `<div class="log-item">${item.activity} (${item.minutes} mins)</div>`;
        total += item.minutes;
      }
    }
  }

  hours.textContent = (total / 60).toFixed(1);
}


// 📝 Submit
async function submitActivity() {
  const user = auth.currentUser;

  await push(ref(db, "activities"), {
    user: user.uid,
    name: userData.name,
    activity: activity.value,
    minutes: parseInt(minutes.value)
  });

  loadActivities(user.uid);
}


// 🚪 Logout
function logout() {
  signOut(auth);
  window.location.href = "index.html";
}


// 🔥 TAB SYSTEM
window.showTab = function(index) {
  const tabs = document.querySelectorAll(".tab");
  const contents = document.querySelectorAll(".content");

  tabs.forEach(t => t.classList.remove("active"));
  contents.forEach(c => c.classList.remove("active"));

  tabs[index].classList.add("active");
  contents[index].classList.add("active");
};

window.submitActivity = submitActivity;
window.logout = logout;

</script>

</body>
</html>
