<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
</head>
<body>

<h2>VIA Portal 2026</h2>

<p><b>Total Hours:</b> <span id="totalHours">0</span>h</p>

<h3>Submit Activity</h3>

<input type="text" id="activity" placeholder="What did you do?"><br><br>
<input type="number" id="minutes" placeholder="Minutes"><br><br>

<button onclick="submitActivity()">Submit Entry</button>

<h3>Recent Activity</h3>
<div id="log"></div>

<script type="module">

// 🔥 Firebase imports
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getDatabase, ref, get, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

// 🔥 YOUR CONFIG (same as login.html)
const firebaseConfig = {
  apiKey: "AIzaSyAUXHMgyVM1kkidzz5FyEfQLfwG7aGTf1Y",
  authDomain: "via-progress-tracker-memory.firebaseapp.com",
  databaseURL: "https://via-progress-tracker-memory-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "via-progress-tracker-memory",
  storageBucket: "via-progress-tracker-memory.firebasestorage.app",
  messagingSenderId: "1022592681906",
  appId: "1:1022592681906:web:2bc2d21155c151770346ab"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getDatabase();

let currentUserData = null;

// 🔒 Protect page
onAuthStateChanged(auth, async (user) => {
  if (!user) {
    window.location.href = "/templates/login.html";
    return;
  }

  // 🔥 Get user data
  const snap = await get(ref(db, "users/" + user.uid));

  if (snap.exists()) {
    currentUserData = snap.val();
    console.log("Logged in as:", currentUserData.name);

    loadActivities(user.uid);
  }
});


// =======================
// 📝 SUBMIT ACTIVITY
// =======================
async function submitActivity() {
  const user = auth.currentUser;

  const activity = document.getElementById("activity").value;
  const minutes = document.getElementById("minutes").value;

  if (!activity || !minutes) {
    alert("Fill all fields!");
    return;
  }

  await push(ref(db, "activities"), {
    user: user.uid,
    name: currentUserData.name,
    activity: activity,
    minutes: parseInt(minutes),
    timestamp: Date.now()
  });

  alert("Activity submitted!");

  loadActivities(user.uid);
}

window.submitActivity = submitActivity;


// =======================
// 📊 LOAD ACTIVITIES
// =======================
async function loadActivities(uid) {
  const logDiv = document.getElementById("log");
  logDiv.innerHTML = "";

  const snap = await get(ref(db, "activities"));

  let totalMinutes = 0;

  if (snap.exists()) {
    const data = snap.val();

    for (let id in data) {
      const item = data[id];

      // 🔥 Only show current user’s data
      if (item.user === uid) {
        const div = document.createElement("div");

        div.textContent = `${item.name} - ${item.activity} (${item.minutes} mins)`;

        logDiv.appendChild(div);

        totalMinutes += item.minutes;
      }
    }
  }

  // 🔥 Update total hours
  document.getElementById("totalHours").textContent = (totalMinutes / 60).toFixed(1);
}

</script>

</body>
</html>
