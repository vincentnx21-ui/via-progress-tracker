<!DOCTYPE html>
<html>
<body>

<h2>Dashboard</h2>
<p>Total Hours: <span id="hours">0</span></p>

<input id="activity" placeholder="Activity"><br><br>
<input id="minutes" type="number"><br><br>

<button onclick="submitActivity()">Submit</button>
<button onclick="logout()">Logout</button>

<div id="log"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getDatabase, ref, get, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = { /* SAME CONFIG */ };

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getDatabase();

let userData;

onAuthStateChanged(auth, async (user) => {
  if (!user) window.location.href = "index.html";

  const snap = await get(ref(db, "users/" + user.uid));
  userData = snap.val();

  load(user.uid);
});

async function submitActivity() {
  const user = auth.currentUser;

  await push(ref(db, "activities"), {
    user: user.uid,
    name: userData.name,
    activity: activity.value,
    minutes: parseInt(minutes.value)
  });

  load(user.uid);
}

async function load(uid) {
  const snap = await get(ref(db, "activities"));
  let total = 0;
  log.innerHTML = "";

  if (snap.exists()) {
    for (let id in snap.val()) {
      let item = snap.val()[id];
      if (item.user === uid) {
        log.innerHTML += `<p>${item.activity} (${item.minutes})</p>`;
        total += item.minutes;
      }
    }
  }

  hours.textContent = (total / 60).toFixed(1);
}

function logout() {
  signOut(auth);
  window.location.href = "index.html";
}

window.submitActivity = submitActivity;
window.logout = logout;
</script>

</body>
</html>
