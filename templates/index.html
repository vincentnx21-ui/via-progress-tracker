<!DOCTYPE html>
<html>
<head>
    <title>VIA Portal 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0f172a] text-slate-200 p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-4xl font-bold text-sky-400 mb-4">🚀 VIA Portal 2026</h1>
        <p class="mb-8 text-slate-400">Total Class Progress: <span class="text-white">{{ total_hours }} Hours</span></p>

        <div class="bg-[#1e293b] p-6 rounded-xl border border-white/5 mb-8">
            <h2 class="text-xl font-bold mb-4">Log New Activity</h2>
            <form action="/submit-log" method="POST" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <select name="user" class="bg-slate-800 p-2 rounded border border-slate-700">
                    {% for m in members %}<option value="{{ m.name }}">{{ m.name }}</option>{% endfor %}
                </select>
                <input type="text" name="task" placeholder="What did you do?" class="bg-slate-800 p-2 rounded border border-slate-700">
                <input type="number" name="minutes" placeholder="Mins" class="bg-slate-800 p-2 rounded border border-slate-700">
                <button type="submit" class="bg-sky-500 hover:bg-sky-400 text-white font-bold py-2 rounded md:col-span-3">Submit Log</button>
            </form>
        </div>

        <div class="bg-[#1e293b] p-6 rounded-xl border border-white/5">
            <h2 class="text-xl font-bold mb-4">Recent Activity</h2>
            {% for log in logs %}
            <div class="border-b border-white/5 py-2 flex justify-between text-sm">
                <span><strong>{{ log.user }}</strong>: {{ log.task }}</span>
                <span class="text-sky-400">{{ log.minutes }}m</span>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
