<!DOCTYPE html>
<html>
<head>
  <title>VIA Portal</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #4facfe, #00f2fe);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 12px;
      width: 300px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      text-align: center;
    }

    h2 {
      margin-bottom: 10px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #4facfe;
      color: white;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: #3a8be0;
    }

    hr {
      margin: 20px 0;
    }
  </style>
</head>

<body>

<div class="card">
  <h2>VIA Portal</h2>

  <h4>Sign Up</h4>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Create Password">
  <button onclick="signup()">Sign Up</button>

  <hr>

  <h4>Login</h4>
  <input id="loginEmail" placeholder="Email">
  <input id="loginPassword" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- KEEP YOUR SCRIPT SAME -->
<script type="module">
/* your firebase code stays the same */
</script>

</body>
</html>
