<!DOCTYPE html>
<html>
<head>
  <title>VIA Portal</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #4facfe, #00f2fe);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 12px;
      width: 320px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      text-align: center;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #4facfe;
      color: white;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: #3a8be0;
    }

    hr {
      margin: 20px 0;
    }
  </style>
</head>

<body>

<div class="card">
  <h2>VIA Portal</h2>

  <h4>Sign Up</h4>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Create Password">
  <button onclick="signup()">Sign Up</button>

  <hr>

  <h4>Login</h4>
  <input id="loginEmail" placeholder="Email">
  <input id="loginPassword" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

// 🔥 Your Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyAUXHMgyVM1kkidzz5FyEfQLfwG7aGTf1Y",
  authDomain: "via-progress-tracker-memory.firebaseapp.com",
  databaseURL: "https://via-progress-tracker-memory-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "via-progress-tracker-memory",
  storageBucket: "via-progress-tracker-memory.appspot.com",
  messagingSenderId: "1022592681906",
  appId: "1:1022592681906:web:2bc2d21155c151770346ab"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getDatabase();


// ================= SIGN UP =================
async function signup() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  if (!email || !password) {
    alert("Please fill all fields");
    return;
  }

  const cleanEmail = email.replace(/\./g, "_");

  // Check if email is allowed
  const snap = await get(ref(db, "rolesByEmail/" + cleanEmail));

  if (!snap.exists()) {
    alert("❌ Your email is not registered!");
    return;
  }

  try {
    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
    const user = userCredential.user;

    const data = snap.val();

    await set(ref(db, "users/" + user.uid), {
      name: data.name,
      email: user.email,
      roles: data.roles
    });

    alert("✅ Account created! Now login.");

  } catch (e) {
    alert(e.message);
  }
}


// ================= LOGIN =================
async function login() {
  const email = document.getElementById("loginEmail").value;
  const password = document.getElementById("loginPassword").value;

  if (!email || !password) {
    alert("Please fill all fields");
    return;
  }

  try {
    const userCredential = await signInWithEmailAndPassword(auth, email, password);
    const user = userCredential.user;

    const cleanEmail = email.replace(/\./g, "_");
    const snap = await get(ref(db, "rolesByEmail/" + cleanEmail));

    if (snap.exists()) {
      const data = snap.val();

      await set(ref(db, "users/" + user.uid), {
        name: data.name,
        email: user.email,
        roles: data.roles
      });

      // 🔥 Redirect based on role
      if (data.roles.includes("teacher")) {
        window.location.href = "admin.html";
      } else {
        window.location.href = "dashboard.html";
      }

    } else {
      alert("No role assigned!");
    }

  } catch (e) {
    alert("Login failed: " + e.message);
  }
}


// 🔥 MAKE BUTTONS WORK
window.signup = signup;
window.login = login;

</script>

</body>
</html>
