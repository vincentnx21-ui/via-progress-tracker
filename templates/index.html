<!DOCTYPE html>
<html>
<head>
  <title>VIA Login</title>
</head>
<body>

<h2>VIA Portal</h2>

<h3>Sign Up (First Time Users)</h3>
<input type="email" id="email" placeholder="Email"><br><br>
<input type="password" id="password" placeholder="Create Password"><br><br>
<button onclick="signup()">Sign Up</button>

<hr>

<h3>Login</h3>
<input type="email" id="loginEmail" placeholder="Email"><br><br>
<input type="password" id="loginPassword" placeholder="Password"><br><br>
<button onclick="login()">Login</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAUXHMgyVM1kkidzz5FyEfQLfwG7aGTf1Y",
  authDomain: "via-progress-tracker-memory.firebaseapp.com",
  databaseURL: "https://via-progress-tracker-memory-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "via-progress-tracker-memory",
  storageBucket: "via-progress-tracker-memory.firebasestorage.app",
  messagingSenderId: "1022592681906",
  appId: "1:1022592681906:web:2bc2d21155c151770346ab"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getDatabase();


// ================= SIGN UP =================
async function signup() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const cleanEmail = email.replace(/\./g, "_");

  // 🔥 Check if email is allowed
  const snap = await get(ref(db, "rolesByEmail/" + cleanEmail));

  if (!snap.exists()) {
    alert("❌ Your email is not registered!");
    return;
  }

  try {
    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
    const user = userCredential.user;

    const data = snap.val();

    await set(ref(db, "users/" + user.uid), {
      name: data.name,
      email: user.email,
      roles: data.roles
    });

    alert("✅ Account created! Now login.");
    
  } catch (e) {
    alert(e.message);
  }
}


// ================= LOGIN =================
async function login() {
  const email = document.getElementById("loginEmail").value;
  const password = document.getElementById("loginPassword").value;

  try {
    const userCredential = await signInWithEmailAndPassword(auth, email, password);
    const user = userCredential.user;

    const cleanEmail = email.replace(/\./g, "_");
    const snap = await get(ref(db, "rolesByEmail/" + cleanEmail));

    if (snap.exists()) {
      const data = snap.val();

      await set(ref(db, "users/" + user.uid), {
        name: data.name,
        email: user.email,
        roles: data.roles
      });

      // 🔥 Redirect based on role
      if (data.roles.includes("teacher")) {
        window.location.href = "admin.html";
      } else {
        window.location.href = "dashboard.html";
      }

    } else {
      alert("No role assigned!");
    }

  } catch (e) {
    alert("Login failed: " + e.message);
  }
}

window.signup = signup;
window.login = login;

</script>

</body>
</html>
