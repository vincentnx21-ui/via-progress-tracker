<!DOCTYPE html>
<html>
<body>

<h2>Admin Page</h2>
<button onclick="logout()">Logout</button>

<script type="module">
import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const auth = getAuth();

function logout() {
  signOut(auth);
  window.location.href = "index.html";
}

window.logout = logout;
</script>

</body>
</html>
