<!DOCTYPE html>
<html>
<head>
  <title>Login / Sign Up</title>
</head>
<body>

<h2>Login / Sign Up</h2>

<input type="email" id="email" placeholder="Email"><br><br>
<input type="password" id="password" placeholder="Password"><br><br>

<button onclick="login()">Login</button>
<button onclick="signup()">Sign Up</button>

<script type="module">

// 🔥 Firebase imports
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

// 🔥 🔥 PUT YOUR FIREBASE CONFIG HERE
const firebaseConfig = {
  apiKey: "AIzaSyAUXHMgyVM1kkidzz5FyEfQLfwG7aGTf1Y",
    authDomain: "via-progress-tracker-memory.firebaseapp.com",
    databaseURL: "https://via-progress-tracker-memory-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "via-progress-tracker-memory",
    storageBucket: "via-progress-tracker-memory.firebasestorage.app",
    messagingSenderId: "1022592681906",
    appId: "1:1022592681906:web:2bc2d21155c151770346ab"
};

// 🔥 Initialize Firebase
const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getDatabase();


// =======================
// 🔐 LOGIN FUNCTION
// =======================
async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try {
    const userCredential = await signInWithEmailAndPassword(auth, email, password);
    const user = userCredential.user;

    const cleanEmail = email.replace(/\./g, "_");

    const snap = await get(ref(db, "rolesByEmail/" + cleanEmail));

    if (snap.exists()) {
      const data = snap.val();

      await set(ref(db, "users/" + user.uid), {
        name: data.name,
        email: user.email,
        roles: data.roles
      });

      console.log("Login success:", data.name);
      console.log("Roles:", data.roles);

      // 🔥 Redirect
      if (data.roles.includes("teacher")) {
        window.location.href = "admin.html";
      } 
      else if (data.roles.includes("via:chairman")) {
        window.location.href = "dashboard.html";
      } 
      else {
        window.location.href = "index.html";
      }

    } else {
      alert("No role assigned!");
    }

  } catch (error) {
    alert(error.message);
  }
}


// =======================
// 🆕 SIGN UP FUNCTION
// =======================
async function signup() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try {
    const cleanEmail = email.replace(/\./g, "_");

    // 🔥 Check if email exists FIRST
    const snap = await get(ref(db, "rolesByEmail/" + cleanEmail));

    if (!snap.exists()) {
      alert("This email is not registered in the system!");
      return;
    }

    // 🔥 Create account
    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
    const user = userCredential.user;

    const data = snap.val();

    // 🔥 Save user info
    await set(ref(db, "users/" + user.uid), {
      name: data.name,
      email: user.email,
      roles: data.roles
    });

    alert("Account created successfully!");

    console.log("Sign up:", data.name);
    console.log("Roles:", data.roles);

    // 🔥 Redirect after signup
    window.location.href = "/templates/index.html";

  } catch (error) {
    alert(error.message);
  }
}


// 🔥 Make functions global
window.login = login;
window.signup = signup;

</script>

</body>
</html>
