<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
</head>
<body>

<h2>Login</h2>

<input type="email" id="email" placeholder="Email"><br><br>
<input type="password" id="password" placeholder="Password"><br><br>

<button onclick="login()">Login</button>

<script type="module">
  // 🔥 Firebase imports
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  // 🔥 Your Firebase config (KEEP YOUR ORIGINAL)
  const firebaseConfig = {
    apiKey: "AIzaSyAUXHMgyVM1kkidzz5FyEfQLfwG7aGTf1Y",
    authDomain: "via-progress-tracker-memory.firebaseapp.com",
    databaseURL: "https://via-progress-tracker-memory-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "via-progress-tracker-memory",
    storageBucket: "via-progress-tracker-memory.firebasestorage.app",
    messagingSenderId: "1022592681906",
    appId: "1:1022592681906:web:2bc2d21155c151770346ab"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth();
  const db = getDatabase();

  // 🔥 LOGIN FUNCTION
  async function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    try {
      // ✅ Sign in
      const userCredential = await signInWithEmailAndPassword(auth, email, password);
      const user = userCredential.user;

      // 🔥 Convert email → safe key
      const cleanEmail = email.replace(/\./g, "_");

      // 🔥 Get roles from database
      const snap = await get(ref(db, "rolesByEmail/" + cleanEmail));

      if (snap.exists()) {
        const data = snap.val();

        // 🔥 Save into users (UID)
        await set(ref(db, "users/" + user.uid), {
          name: data.name,
          email: user.email,
          roles: data.roles
        });

        console.log("Logged in:", data.name);
        console.log("Roles:", data.roles);

        // 🔥 REDIRECT BASED ON ROLE
        if (data.roles.includes("teacher")) {
          window.location.href = "/templates/admin.html";
        } 
        else if (data.roles.includes("via:chairman")) {
          window.location.href = "/templates/dashboard.html";
        } 
        else {
          window.location.href = "/templates/index.html";
        }

      } else {
        alert("No role assigned to this email!");
      }

    } catch (error) {
      alert(error.message);
    }
  }

  window.login = login;
</script>

</body>
</html>
